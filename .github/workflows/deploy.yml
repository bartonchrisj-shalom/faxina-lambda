name: Deploy Microservices

on:
  push:
    branches:
      - main

jobs:
  deploy-microservices:
    runs-on: ubuntu-latest
    
    # 1. THE MATRIX: Define your microservices and their physical Lambda names here
    strategy:
      matrix:
        service:
          - folder: users
            function_name: faxina-app-UsersFunction-AlYDZdz30AZv
            
          - folder: triggers\postAuth
           function_name: faxina-app-PostAuthFunction-8vNOUyDSR7Q6

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 2. Install dependencies at the root level (where package.json lives)
      - name: Install Dependencies
        run: npm ci

      # 3. Bundle ONLY the specific microservice for this matrix run using esbuild
      - name: Build with esbuild
        run: >
          npx esbuild src/functions/${{ matrix.service.folder }}/index.ts 
          --bundle 
          --minify 
          --platform=node 
          --target=node20 
          --outfile=dist/${{ matrix.service.folder }}/index.js

      # 4. Zip just that single bundled file (no node_modules!)
      - name: Zip Code
        working-directory: ./dist/${{ matrix.service.folder }}
        run: zip function.zip index.js

      # 5. Authenticate with AWS
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # 6. Push the hyper-optimized zip to the correct Lambda
      - name: Update Lambda Function
        run: >
          aws lambda update-function-code 
          --function-name ${{ matrix.service.function_name }} 
          --zip-file fileb://dist/${{ matrix.service.folder }}/function.zip

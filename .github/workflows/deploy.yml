name: Deploy Lambda Code Only

on:
  push:
    branches:
      - main

jobs:
  deploy-code:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 1. Install dependencies inside your src folder
      - name: Install Dependencies
        working-directory: ./src
        run: npm ci

      # 2. Package the code into a zip file
      - name: Zip Code
        working-directory: ./src
        run: zip -r ../function.zip .

      # 3. Authenticate with AWS
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1 # Change if your region is different

      # 4. Push the zip directly to the Lambda function
      - name: Update Lambda Function
        run: >
          aws lambda update-function-code 
          --function-name faxina-app-BackendServiceFunction-yQIhuVGwU0RG 
          --zip-file fileb://function.zip
